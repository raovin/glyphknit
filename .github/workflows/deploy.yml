name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: glyphknit-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.GLYPHKNIT_DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.GLYPHKNIT_DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.GLYPHKNIT_DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.GLYPHKNIT_DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.GLYPHKNIT_DEPLOY_USER }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/glyphknit_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/glyphknit_deploy
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          release="glyphknit-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          rsync -az --delete --no-owner --no-group --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/glyphknit_deploy -o StrictHostKeyChecking=yes" \
            out/ "${DEPLOY_USER}@${DEPLOY_HOST}:~/releases/${release}/"
          ssh -i ~/.ssh/glyphknit_deploy -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' RELEASE='${release}' bash -se" <<'REMOTE'
          set -euo pipefail
          release_dir="${HOME}/releases/${RELEASE}"
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          backup_dir="${HOME}/backups/glyphknit.backup-${timestamp}"
          test -f "${release_dir}/index.html"
          test -f "${release_dir}/sitemap.xml"
          cp -a "${DEPLOY_PATH}" "${backup_dir}"
          rsync -a --delete --no-owner --no-group --chmod=D755,F644 "${release_dir}/" "${DEPLOY_PATH}/"
          rm -rf "${release_dir}"
          find "${DEPLOY_PATH}" -maxdepth 3 -type f -name index.html | wc -l
          REMOTE

      - name: Smoke test production
        run: |
          set -euo pipefail
          curl -fsSIL https://glyphknit.com/
          curl -fsSIL https://glyphknit.com/contact/
          curl -fsSL https://glyphknit.com/sitemap.xml | grep -q 'https://glyphknit.com/'
